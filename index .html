<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NattDev Rescue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-red { background-color: #ef4444; color: white; font-weight: bold; transition: all 0.2s; }
        .btn-red:active { transform: scale(0.95); opacity: 0.9; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md card p-6 text-center">
        <!-- Brand -->
        <div class="mb-4">
            <h1 class="text-2xl font-black text-red-600 tracking-wider">NATTDEV RESCUE</h1>
            <div class="h-1 w-20 bg-red-600 mx-auto rounded-full mt-1"></div>
        </div>

        <!-- Form Page -->
        <div id="formPage">
            <p class="text-slate-500 text-sm mb-6">กรอกข้อมูลเพื่อขอความช่วยเหลือด่วน</p>
            <form id="rescueForm" class="text-left space-y-4">
                <input type="text" id="name" placeholder="ชื่อผู้แจ้ง" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-red-500">
                <input type="tel" id="tel" placeholder="เบอร์โทรศัพท์" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-red-500">
                
                <select id="type" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-red-500">
                    <option value="">-- ประเภทเหตุ --</option>
                    <option value="อุบัติเหตุ">อุบัติเหตุรถยนต์/จยย.</option>
                    <option value="ไฟไหม้">เหตุเพลิงไหม้</option>
                    <option value="ป่วยฉุกเฉิน">ผู้ป่วยฉุกเฉิน/หมดสติ</option>
                    <option value="อื่นๆ">ขอความช่วยเหลืออื่นๆ</option>
                </select>

                <textarea id="loc" placeholder="สถานที่เกิดเหตุ" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-red-500"></textarea>

                <div class="grid grid-cols-2 gap-2 text-xs">
                    <button type="button" id="gpsBtn" class="p-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl font-bold">แชร์พิกัด</button>
                    <button type="button" id="photoBtn" onclick="document.getElementById('fileInput').click()" class="p-3 bg-slate-50 text-slate-600 border border-slate-200 rounded-xl font-bold">แนบรูปภาพ</button>
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </div>

                <button type="submit" id="submitBtn" class="w-full btn-red py-4 rounded-xl text-lg shadow-lg shadow-red-200 mt-2">ยืนยันแจ้งกู้ภัย</button>
            </form>
        </div>

        <!-- Success Page -->
        <div id="successPage" class="hidden py-8">
            <div class="text-6xl mb-4 text-green-500">✓</div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">ส่งข้อมูลสำเร็จ</h2>
            <p class="text-slate-500 mb-8">เจ้าหน้าที่กำลังตรวจสอบ<br>กรุณารอรับสายโทรศัพท์</p>
            <button onclick="resetApp()" class="w-full p-4 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200">กลับไปหน้าแรก</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8732929782:AAEFZMGYW4oUvssPejul92U6z7qKKga96bE";
        const CHAT_ID = "7967010433";
        let gpsData = "ไม่ได้แชร์พิกัด";
        let imageFile = null;

        // Image Selection
        document.getElementById('fileInput').onchange = (e) => {
            imageFile = e.target.files[0];
            if(imageFile) document.getElementById('photoBtn').innerText = "✅ เลือกรูปแล้ว";
        };

        // GPS Selection
        document.getElementById('gpsBtn').onclick = function() {
            if (navigator.geolocation) {
                this.innerText = "...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    gpsData = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    this.innerText = "✅ บันทึกพิกัดแล้ว";
                    this.classList.replace('bg-blue-50', 'bg-green-50');
                    this.classList.replace('text-blue-600', 'text-green-600');
                }, () => { alert("กรุณาเปิด GPS"); this.innerText = "แชร์พิกัด"; });
            }
        };

        // Voice Notification
        function playThaiVoice() {
            const msg = new SpeechSynthesisUtterance("แจ้งเหตุเสร็จแล้วครับ กรุณารอเจ้าหน้าที่ติดต่อกลับ");
            msg.lang = 'th-TH';
            window.speechSynthesis.speak(msg);
        }

        // Reset App
        function resetApp() {
            document.getElementById('rescueForm').reset();
            gpsData = "ไม่ได้แชร์พิกัด";
            imageFile = null;
            document.getElementById('photoBtn').innerText = "แนบรูปภาพ";
            document.getElementById('gpsBtn').innerText = "แชร์พิกัด";
            document.getElementById('gpsBtn').className = "p-3 bg-blue-50 text-blue-600 border border-blue-200 rounded-xl font-bold";
            document.getElementById('successPage').classList.add('hidden');
            document.getElementById('formPage').classList.remove('hidden');
        }

        // Submit Form
        document.getElementById('rescueForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "กำลังส่ง...";

            const name = document.getElementById('name').value;
            const tel = document.getElementById('tel').value;
            const type = document.getElementById('type').value;
            const loc = document.getElementById('loc').value;

            const text = `🚨 *แจ้งเหตุ NattDev* 🚨\n👤 ชื่อ: ${name}\n📞 เบอร์: ${tel}\n⚠️ เหตุ: ${type}\n📍 สถานที่: ${loc}\n🗺️ พิกัด: ${gpsData}`;

            try {
                let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                let body;

                if (imageFile) {
                    url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', imageFile);
                    fd.append('caption', text);
                    fd.append('parse_mode', 'Markdown');
                    body = fd;
                } else {
                    body = JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' });
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: imageFile ? {} : { 'Content-Type': 'application/json' },
                    body: body
                });

                if (res.ok) {
                    document.getElementById('formPage').classList.add('hidden');
                    document.getElementById('successPage').classList.remove('hidden');
                    playThaiVoice();
                } else {
                    alert("ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่");
                    btn.disabled = false;
                    btn.innerText = "ยืนยันแจ้งกู้ภัย";
                }
            } catch (err) {
                alert("การเชื่อมต่อมีปัญหา");
                btn.disabled = false;
                btn.innerText = "ยืนยันแจ้งกู้ภัย";
            }
        };
    </script>
</body>
</html>
