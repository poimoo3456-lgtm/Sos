<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NattDev Rescue System</title>
    <!-- ใช้ CSS ภายในตัวไฟล์เอง ไม่โหลดจากภายนอกเพื่อป้องกัน 404 -->
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }
        .container {
            background: white;
            width: 95%;
            max-width: 450px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo { color: #e11d48; font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .sub-logo { color: #64748b; font-size: 12px; letter-spacing: 2px; margin-bottom: 25px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: #e11d48; }

        .btn-submit {
            background-color: #e11d48;
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.3);
        }
        .btn-submit:active { transform: scale(0.98); }

        .btn-tool {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .btn-tool.active { background: #dcfce7; color: #166534; border-color: #bbf7d0; }

        .hidden { display: none; }
        .success-box { padding: 40px 10px; }
        .success-icon { font-size: 60px; color: #22c55e; margin-bottom: 15px; }
        
        #preview-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="ui-form">
            <div class="logo">NATTDEV RESCUE</div>
            <div class="sub-logo">SYSTEM V.5 (STABLE)</div>

            <form id="emergencyForm">
                <div class="form-group">
                    <label>ชื่อผู้แจ้ง</label>
                    <input type="text" id="name" required placeholder="ระบุชื่อของคุณ">
                </div>
                <div class="form-group">
                    <label>เบอร์โทรศัพท์ติดต่อ</label>
                    <input type="tel" id="tel" required placeholder="0XX-XXXXXXX">
                </div>
                <div class="form-group">
                    <label>ประเภทเหตุ</label>
                    <select id="type" required>
                        <option value="">-- เลือกประเภท --</option>
                        <option value="อุบัติเหตุ">อุบัติเหตุรถยนต์/มอเตอร์ไซค์</option>
                        <option value="ป่วยฉุกเฉิน">ผู้ป่วยฉุกเฉิน/หมดสติ</option>
                        <option value="เพลิงไหม้">เหตุเพลิงไหม้</option>
                        <option value="อื่นๆ">ขอความช่วยเหลืออื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>สถานที่เกิดเหตุ</label>
                    <textarea id="loc" rows="2" required placeholder="ระบุที่อยู่หรือจุดสังเกต"></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button type="button" id="btn-gps" class="btn-tool">📍 แชร์พิกัด</button>
                    <button type="button" id="btn-photo" class="btn-tool" onclick="document.getElementById('file-input').click()">📷 ถ่ายภาพ</button>
                </div>
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <img id="preview-img">

                <button type="submit" id="submit-btn" class="btn-submit">ยืนยันแจ้งกู้ภัย</button>
            </form>
        </div>

        <!-- หน้าจอเมื่อสำเร็จ -->
        <div id="ui-success" class="hidden success-box">
            <div class="success-icon">✔</div>
            <h2 style="margin: 0;">ส่งข้อมูลสำเร็จ</h2>
            <p style="color: #64748b; margin: 15px 0 30px;">เจ้าหน้าที่รับเรื่องแล้ว<br>โปรดรอรับสายโทรศัพท์</p>
            <button onclick="window.location.reload()" class="btn-submit" style="background: #64748b;">แจ้งเหตุใหม่</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8732929782:AAEFZMGYW4oUvssPejul92U6z7qKKga96bE";
        const CHAT_ID = "7967010433";
        let latLon = "ไม่ได้ระบุ";
        let imageToUpload = null;

        // ดึงพิกัด
        document.getElementById('btn-gps').onclick = function() {
            const el = this;
            if (navigator.geolocation) {
                el.innerText = "กำลังระบุ...";
                navigator.geolocation.getCurrentPosition((p) => {
                    latLon = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                    el.innerText = "✅ เก็บพิกัดแล้ว";
                    el.classList.add('active');
                }, () => { alert("กรุณาเปิด GPS"); el.innerText = "📍 แชร์พิกัด"; });
            }
        };

        // จัดการรูปภาพ
        document.getElementById('file-input').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                imageToUpload = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.getElementById('preview-img');
                    img.src = ev.target.result;
                    img.style.display = 'block';
                    document.getElementById('btn-photo').innerText = "✅ บันทึกรูปแล้ว";
                    document.getElementById('btn-photo').classList.add('active');
                };
                reader.readAsDataURL(file);
            }
        };

        // เสียงพูด
        function speak() {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance("ส่งข้อมูลสำเร็จแล้วครับ โปรดรอเจ้าหน้าที่ติดต่อกลับ");
                msg.lang = 'th-TH';
                window.speechSynthesis.speak(msg);
            }
        }

        // ส่งฟอร์ม
        document.getElementById('emergencyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "กำลังส่งข้อมูล...";

            const msgText = `🚨 *แจ้งเหตุ NattDev V.5* 🚨\n👤 ชื่อ: ${document.getElementById('name').value}\n📞 เบอร์: ${document.getElementById('tel').value}\n⚠️ เหตุ: ${document.getElementById('type').value}\n📍 สถานที่: ${document.getElementById('loc').value}\n🗺️ พิกัด: ${latLon}`;

            try {
                let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                let body;

                if (imageToUpload) {
                    url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', imageToUpload);
                    fd.append('caption', msgText);
                    fd.append('parse_mode', 'Markdown');
                    body = fd;
                } else {
                    body = JSON.stringify({ chat_id: CHAT_ID, text: msgText, parse_mode: 'Markdown' });
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: imageToUpload ? {} : { 'Content-Type': 'application/json' },
                    body: body
                });

                if (res.ok) {
                    document.getElementById('ui-form').classList.add('hidden');
                    document.getElementById('ui-success').classList.remove('hidden');
                    speak();
                } else {
                    alert("เกิดข้อผิดพลาดจากเซิร์ฟเวอร์");
                }
            } catch (err) {
                alert("การส่งล้มเหลว ตรวจสอบอินเทอร์เน็ต");
            } finally {
                btn.disabled = false;
                btn.innerText = "ยืนยันแจ้งกู้ภัย";
            }
        };
    </script>
</body>
</html>
