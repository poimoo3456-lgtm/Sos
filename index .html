<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rescue Emergency | NattDev Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif;
            background-color: #f8fafc;
            touch-action: manipulation;
        }
        .emergency-pulse {
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .loading-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: dot-blink 1.4s infinite both;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        .btn-shadow {
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #020617; }
            .card-main { background-color: #1e293b; border: 1px solid #334155; }
            .input-box { background-color: #0f172a; color: white; border: 1px solid #334155; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header -->
    <div class="mb-6 flex flex-col items-center space-y-2">
        <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center text-white emergency-pulse">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        <h1 class="text-xl font-black text-red-600 tracking-[0.2em] uppercase">NattDev Rescue</h1>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="w-full max-w-lg card-main bg-white p-6 sm:p-8 rounded-[2rem] shadow-2xl transition-all duration-300">
        
        <!-- Form UI -->
        <div id="formSection">
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">แจ้งเหตุฉุกเฉิน</h2>
            <p class="text-slate-500 text-sm mb-6">ระบุข้อมูลเพื่อให้กู้ภัยติดต่อกลับได้รวดเร็ว</p>

            <form id="rescueForm" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <input type="text" id="name" placeholder="ชื่อผู้แจ้ง" required class="input-box w-full bg-slate-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
                    <input type="tel" id="tel" placeholder="เบอร์โทรศัพท์" required class="input-box w-full bg-slate-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
                </div>

                <select id="type" required class="input-box w-full bg-slate-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all">
                    <option value="">-- เลือกประเภทเหตุ --</option>
                    <option value="🚑 อุบัติเหตุรุนแรง">อุบัติเหตุรุนแรง</option>
                    <option value="🔥 อัคคีภัย">อัคคีภัย</option>
                    <option value="🩺 เจ็บป่วยฉุกเฉิน">เจ็บป่วยฉุกเฉิน</option>
                    <option value="🆘 ขอความช่วยเหลืออื่นๆ">ขอความช่วยเหลืออื่นๆ</option>
                </select>

                <textarea id="loc" placeholder="ระบุสถานที่เกิดเหตุ" required rows="2" class="input-box w-full bg-slate-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-500 transition-all"></textarea>

                <div class="flex gap-2">
                    <button type="button" id="gpsBtn" class="flex-1 bg-blue-50 text-blue-600 font-bold py-3 rounded-xl flex items-center justify-center space-x-2 border border-blue-100 dark:bg-blue-900/20 dark:border-blue-800 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                        <span id="gpsTxt">แชร์พิกัด</span>
                    </button>
                    <label class="flex-1 bg-slate-50 text-slate-600 font-bold py-3 rounded-xl flex items-center justify-center space-x-2 border border-slate-200 cursor-pointer dark:bg-slate-700 dark:border-slate-600 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                        <span id="photoTxt">แนบรูป</span>
                        <input type="file" id="photo" accept="image/*" class="hidden">
                    </label>
                </div>
                <img id="preview" class="hidden w-full h-32 object-cover rounded-xl mt-2">

                <button type="submit" id="submitBtn" class="w-full bg-red-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-red-700 active:scale-95 transition-all text-xl btn-shadow">
                    ส่งสัญญาณแจ้งกู้ภัย
                </button>
            </form>
        </div>

        <!-- Success UI (Initially Hidden) -->
        <div id="successSection" class="hidden text-center py-10 space-y-6">
            <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto shadow-2xl animate-bounce">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-3xl font-black text-slate-800 dark:text-white">ส่งเหตุสำเร็จ!</h2>
            <p class="text-slate-500 dark:text-slate-400 font-medium">เจ้าหน้าที่ได้รับข้อมูลของคุณแล้ว<br>กรุณารอรับสายโทรศัพท์</p>
            <button id="newReportBtn" class="w-full bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold py-4 rounded-xl hover:bg-slate-200 transition-all">
                แจ้งเหตุใหม่เพิ่มเติม
            </button>
        </div>

    </div>

    <!-- Footer -->
    <footer class="mt-8 text-center opacity-40">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">NattDev Technical System</p>
    </footer>

    <script>
        const BOT_TOKEN = "8732929782:AAEFZMGYW4oUvssPejul92U6z7qKKga96bE";
        const CHAT_ID = "7967010433";
        let currentGps = "ไม่ระบุพิกัด";
        let photoFile = null;

        // Image Handling
        document.getElementById('photo').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                photoFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.getElementById('preview');
                    img.src = ev.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('photoTxt').innerText = "✅ บันทึกแล้ว";
                };
                reader.readAsDataURL(file);
            }
        });

        // GPS Handling
        document.getElementById('gpsBtn').addEventListener('click', function() {
            const btnTxt = document.getElementById('gpsTxt');
            if (navigator.geolocation) {
                btnTxt.innerText = "กำลังหา...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    currentGps = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    btnTxt.innerText = "✅ บันทึกพิกัด";
                    this.classList.replace('bg-blue-50', 'bg-green-50');
                    this.classList.replace('text-blue-600', 'text-green-600');
                }, () => { btnTxt.innerText = "❌ ระบุไม่ได้"; }, { enableHighAccuracy: true });
            }
        });

        // Native Browser Voice Synthesis (เสถียรที่สุดในทุกอุปกรณ์)
        function playVoice() {
            const speech = new SpeechSynthesisUtterance("แจ้งเหตุเสร็จแล้วครับ กรุณารอเจ้าหน้าที่ติดต่อกลับ");
            speech.lang = 'th-TH';
            speech.rate = 1;
            window.speechSynthesis.speak(speech);
        }

        // Submit Logic
        document.getElementById('rescueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalTxt = btn.innerText;
            
            btn.disabled = true;
            btn.innerHTML = 'ส่งข้อมูล <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>';

            const name = document.getElementById('name').value;
            const tel = document.getElementById('tel').value;
            const type = document.getElementById('type').value;
            const loc = document.getElementById('loc').value;

            const caption = `🚨 *แจ้งเหตุกู้ภัย (NattDev)* 🚨\n` +
                            `━━━━━━━━━━━━━━━\n` +
                            `👤 ผู้แจ้ง: ${name}\n` +
                            `📞 เบอร์: [${tel}](tel:${tel})\n` +
                            `⚠️ เหตุ: ${type}\n` +
                            `📍 สถานที่: ${loc}\n` +
                            `🗺️ พิกัด: [เปิดแผนที่](${currentGps})\n` +
                            `━━━━━━━━━━━━━━━\n` +
                            `🕒 ${new Date().toLocaleString('th-TH')}`;

            try {
                let url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                let body;

                if (photoFile) {
                    url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', photoFile);
                    fd.append('caption', caption);
                    fd.append('parse_mode', 'Markdown');
                    body = fd;
                } else {
                    body = JSON.stringify({ chat_id: CHAT_ID, text: caption, parse_mode: 'Markdown' });
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: photoFile ? {} : { 'Content-Type': 'application/json' },
                    body: body
                });

                if (res.ok) {
                    document.getElementById('formSection').classList.add('hidden');
                    document.getElementById('successSection').classList.remove('hidden');
                    playVoice();
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            } catch (err) {
                alert("ล้มเหลว! กรุณาโทร 1669 ทันที");
                btn.disabled = false;
                btn.innerText = originalTxt;
            }
        });

        // Reset App Logic (No Reload)
        document.getElementById('newReportBtn').addEventListener('click', () => {
            // Reset Form & Vars
            document.getElementById('rescueForm').reset();
            photoFile = null;
            currentGps = "ไม่ระบุพิกัด";
            
            // Reset UI States
            document.getElementById('preview').classList.add('hidden');
            document.getElementById('preview').src = "";
            document.getElementById('photoTxt').innerText = "แนบรูป";
            document.getElementById('gpsTxt').innerText = "แชร์พิกัด";
            
            const gpsBtn = document.getElementById('gpsBtn');
            gpsBtn.className = "flex-1 bg-blue-50 text-blue-600 font-bold py-3 rounded-xl flex items-center justify-center space-x-2 border border-blue-100 dark:bg-blue-900/20 dark:border-blue-800 transition-all";
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = false;
            submitBtn.innerText = "ส่งสัญญาณแจ้งกู้ภัย";

            // Toggle Sections
            document.getElementById('successSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
